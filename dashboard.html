<script>
  function buildHeatmap(data){
    const container = document.getElementById("heatmap");
    container.innerHTML = "";

    const eligibleRows = getHeatmapEligibleRows(data);
    if(!eligibleRows.length){
      container.innerHTML = `<div class="modal-empty">Sem dados do dia atual para exibir no heatmap</div>`;
      return;
    }

    function getMetricColor(metricKey, value){
      if(value === null || value === undefined || isNaN(value)) return "#f8fafc";

      if(metricKey === "rec"){
        if(value < 6) return "#fecaca";
        if(value < 7) return "#fde68a";
        return "#bbf7d0";
      }

      if(value < 4) return "#fecaca";
      if(value < 7) return "#fde68a";
      return "#bbf7d0";
    }

    eligibleRows.forEach(row => {
      const metrics = [
        {label:"R", key:"rec", value:safeNullable(row["RECUPERAÇÃO"])},
        {label:"S", key:"sleep", value:safeNullable(row["SONO"])},
        {label:"F", key:"fad", value:safeNullable(row["FADIGA"])},
        {label:"E", key:"est", value:safeNullable(row["ESTRESSE"])},
        {label:"D", key:"dor", value:safeNullable(row["DOR"])}
      ];

      const wrap = document.createElement("div");
      wrap.className = "heat-row";

      const name = document.createElement("div");
      name.className = "heat-name";
      name.textContent = getName(row);
      wrap.appendChild(name);

      metrics.forEach(m => {
        const cell = document.createElement("div");
        cell.className = "heat-cell";

        if(m.value === null){
          cell.style.background = "#f8fafc";
          cell.style.border = "1px solid #e2e8f0";
          cell.style.color = "#94a3b8";
          cell.title = `${m.label}: sem dado`;
          cell.innerText = "-";
        } else {
          cell.style.background = getMetricColor(m.key, m.value);
          cell.title = `${m.label}: ${m.value}`;
          cell.innerText = m.value.toFixed(0);
        }

        wrap.appendChild(cell);
      });

      container.appendChild(wrap);
    });
  }
</script>
