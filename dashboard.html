<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Science Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#f8fafc;
      --panel:#ffffff;
      --border:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --green:#16a34a;
      --orange:#f59e0b;
      --red:#dc2626;
      --blue:#2563eb;
      --purple:#7c3aed;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:32px;
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:1600px;
      margin:auto;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:28px;
      flex-wrap:wrap;
    }

    .title{
      font-size:32px;
      font-weight:700;
      letter-spacing:-0.02em;
    }

    .subtitle{
      font-size:14px;
      color:var(--muted);
      margin-top:4px;
    }

    .filters{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    select{
      background:white;
      border:1px solid var(--border);
      padding:10px 14px;
      border-radius:10px;
      color:var(--text);
      font-size:14px;
      min-width:180px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      padding:22px;
      border-radius:16px;
      box-shadow:0 8px 22px rgba(15,23,42,0.05);
      margin-bottom:24px;
    }

    .chart-title{
      font-size:16px;
      font-weight:600;
      margin-bottom:12px;
    }

    canvas{
      width:100% !important;
      height:430px !important;
    }

    #phaseChart{
      height:400px !important;
    }

    .alert-box{
      background:#fff7ed;
      border:1px solid #fdba74;
      padding:16px;
      border-radius:12px;
      margin-bottom:24px;
    }

    .alert-item{
      padding:10px 12px;
      margin-bottom:8px;
      border-radius:8px;
      background:#fee2e2;
      color:#7f1d1d;
      font-size:14px;
    }

    .metric-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .metric{
      background:#f1f5f9;
      padding:20px;
      border-radius:12px;
      text-align:center;
      border:1px solid #e2e8f0;
    }

    .metric-value{
      font-size:28px;
      font-weight:700;
    }

    .metric-label{
      font-size:13px;
      color:var(--muted);
      margin-top:6px;
    }

    @media (max-width: 900px){
      body{padding:18px}

      .metric-grid{
        grid-template-columns:1fr;
      }

      .filters{
        width:100%;
      }

      select{
        width:100%;
      }

      canvas{
        height:360px !important;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
      <div>
        <div class="title">Athlete Monitoring Dashboard</div>
        <div class="subtitle">Wellness Monitoring</div>
      </div>

      <div class="filters">
        <select id="teamFilter">
          <option value="Todas">Todas as Equipes</option>
          <option value="15">Sub 15</option>
          <option value="18">Sub 18</option>
          <option value="21">Sub 21</option>
          <option value="24">Sub 24</option>
        </select>

        <select id="athleteFilter">
          <option value="Equipe">Equipe (Todos)</option>
        </select>
      </div>
    </div>

    <h3>Atletas em Alerta</h3>
    <div class="alert-box" id="alerts"></div>

    <div class="card">
      <div class="chart-title">Wellness Diário</div>
      <canvas id="wellnessChart"></canvas>
    </div>

    <div class="card" id="performanceSection" style="display:none">
      <div class="chart-title">Performance do Atleta ao Longo do Tempo</div>
      <canvas id="performance"></canvas>
    </div>

    <div class="card" id="perfilSection" style="display:none">
      <h3>Perfil do Atleta</h3>
      <div class="metric-grid">
        <div class="metric">
          <div id="cmjMetric" class="metric-value">-</div>
          <div class="metric-label">CMJ</div>
        </div>
        <div class="metric">
          <div id="sjMetric" class="metric-value">-</div>
          <div class="metric-label">Squat Jump</div>
        </div>
        <div class="metric">
          <div id="mbMetric" class="metric-value">-</div>
          <div class="metric-label">Medicine Ball</div>
        </div>
      </div>
    </div>

    <div class="card" id="phasePerformance" style="display:none">
      <div class="chart-title">Performance por Fase</div>
      <canvas id="phaseChart"></canvas>
    </div>

  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2zqGesxYsRhgphN6dpzLhoCCHk54JzzXT7PEFYhLni7uegkBTxRrj8_q3ZzJdN9P77Uum8C078cD8/pub?gid=1108601119&single=true&output=csv";

    let rawData = [];
    let charts = {};

    function mean(arr){
      const valid = arr.filter(v => !isNaN(v) && v !== 0);
      return valid.length ? valid.reduce((a,b)=>a+b,0) / valid.length : 0;
    }

    function safe(v){
      if(v === null || v === undefined || v === "") return 0;
      const n = Number(String(v).replace(",", "."));
      return isNaN(n) ? 0 : n;
    }

    function formatMetric(v){
      const n = safe(v);
      return n === 0 ? "-" : n.toFixed(2);
    }

    function getTeam(name){
      if(!name) return "";
      const parts = name.trim().split(" ");
      return parts[parts.length - 1];
    }

    function formatDateBR(dateString){
      if(!dateString) return "";
      const onlyDate = dateString.split(" ")[0];
      const parts = onlyDate.split("/");
      if(parts.length === 3){
        return `${parts[0]}/${parts[1]}`;
      }
      return onlyDate;
    }

    function getShiftLabel(row){
      const raw = String(row["Fase"] || row["Turno"] || "").trim().toLowerCase();

      if(
        raw === "1" ||
        raw === "turno 1" ||
        raw === "fase 1" ||
        raw.includes("1")
      ){
        return "Manhã";
      }

      if(
        raw === "2" ||
        raw === "turno 2" ||
        raw === "fase 2" ||
        raw.includes("2")
      ){
        return "Tarde";
      }

      return raw ? raw : "";
    }

    function getDateLabel(row){
      const date = formatDateBR(row["Carimbo de data/hora"] || "");
      const shift = getShiftLabel(row);
      return shift ? `${date} • ${shift}` : date;
    }

    function getDateTimeValue(row){
      const raw = row["Carimbo de data/hora"];
      if(!raw) return 0;

      const [datePart, timePart] = raw.split(" ");
      if(!datePart) return 0;

      const d = datePart.split("/");
      if(d.length !== 3) return 0;

      const day = d[0].padStart(2, "0");
      const month = d[1].padStart(2, "0");
      const year = d[2];
      const time = timePart || "00:00:00";

      return new Date(`${year}-${month}-${day}T${time}`).getTime();
    }

    function sortByTimestamp(data){
      return [...data].sort((a, b) => getDateTimeValue(a) - getDateTimeValue(b));
    }

    function resetAthleteMetrics(){
      document.getElementById("cmjMetric").innerText = "-";
      document.getElementById("sjMetric").innerText = "-";
      document.getElementById("mbMetric").innerText = "-";
    }

    function destroyChart(name){
      if(charts[name]){
        charts[name].destroy();
        charts[name] = null;
      }
    }

    function buildAlerts(filteredTeam = "Todas"){
      const container = document.getElementById("alerts");
      container.innerHTML = "";

      let alertData = [...rawData];

      if(filteredTeam !== "Todas"){
        alertData = alertData.filter(d => getTeam(d["Nome"]) === filteredTeam);
      }

      const athletes = [...new Set(alertData.map(d => d["Nome"]).filter(Boolean))];

      athletes.forEach(a => {
        const rows = sortByTimestamp(alertData.filter(r => r["Nome"] === a));
        const last = rows[rows.length - 1];
        if(!last) return;

        const rec = safe(last["RECUPERAÇÃO"]);
        const sono = safe(last["SONO"]);
        const fad = safe(last["FADIGA"]);
        const est = safe(last["ESTRESSE"]);
        const dor = safe(last["DOR"]);

        let issues = [];

        if(rec < 6) issues.push("Recuperação < 6");
        if(sono < 4) issues.push("Sono < 4");
        if(fad < 4) issues.push("Fadiga < 4");
        if(est < 4) issues.push("Estresse < 4");
        if(dor < 4) issues.push("Dor < 4");

        if(issues.length > 0){
          const div = document.createElement("div");
          div.className = "alert-item";
          div.innerHTML = `<strong>${a}</strong> → ${issues.join(", ")}`;
          container.appendChild(div);
        }
      });

      if(container.innerHTML === ""){
        container.innerHTML = "<div style='color:green;font-weight:600'>Nenhum alerta</div>";
      }
    }

    function baseChartOptions(yMin = 0, yMax = 10){
      return {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
          mode: "index",
          intersect: false
        },
        plugins: {
          legend: {
            labels: {
              font: {
                size: 13,
                weight: "600"
              },
              usePointStyle: true,
              pointStyle: "line"
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: "#475569",
              maxRotation: 45,
              minRotation: 45,
              autoSkip: true,
              maxTicksLimit: 18
            },
            grid: {
              color: "rgba(148,163,184,0.12)"
            }
          },
          y: {
            min: yMin,
            max: yMax,
            ticks: {
              color: "#475569"
            },
            grid: {
              color: "rgba(148,163,184,0.12)"
            }
          }
        }
      };
    }

    function drawWellness(labels, rec, rpe, sleep, fad, est, dor){
      destroyChart("wellnessChart");

      charts.wellnessChart = new Chart(document.getElementById("wellnessChart"), {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "Recuperação",
              data: rec,
              borderColor: "#16a34a",
              backgroundColor: "#16a34a",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 3,
              pointHoverRadius: 5
            },
            {
              label: "Esforço",
              data: rpe,
              borderColor: "#f59e0b",
              backgroundColor: "#f59e0b",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 3,
              pointHoverRadius: 5
            },
            {
              label: "Sono",
              data: sleep,
              borderColor: "#2563eb",
              backgroundColor: "#2563eb",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 3,
              pointHoverRadius: 5
            },
            {
              label: "Fadiga",
              data: fad,
              borderColor: "#f97316",
              backgroundColor: "#f97316",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 3,
              pointHoverRadius: 5
            },
            {
              label: "Estresse",
              data: est,
              borderColor: "#dc2626",
              backgroundColor: "#dc2626",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 3,
              pointHoverRadius: 5
            },
            {
              label: "Dor",
              data: dor,
              borderColor: "#7c3aed",
              backgroundColor: "#7c3aed",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 3,
              pointHoverRadius: 5
            }
          ]
        },
        options: {
          ...baseChartOptions(0, 10),
          plugins: {
            ...baseChartOptions(0, 10).plugins,
            annotation: {
              annotations: {
                zonaCritica: {
                  type: "box",
                  yMin: 0,
                  yMax: 6,
                  backgroundColor: "rgba(220,38,38,0.10)",
                  borderWidth: 0
                },
                zonaAlerta: {
                  type: "box",
                  yMin: 6,
                  yMax: 7,
                  backgroundColor: "rgba(245,158,11,0.12)",
                  borderWidth: 0
                },
                zonaIdeal: {
                  type: "box",
                  yMin: 7,
                  yMax: 10,
                  backgroundColor: "rgba(34,197,94,0.12)",
                  borderWidth: 0
                }
              }
            }
          }
        }
      });
    }

    function drawPerformance(labels, cmj, sj, mb){
      destroyChart("performance");

      charts.performance = new Chart(document.getElementById("performance"), {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "CMJ",
              data: cmj,
              borderColor: "#0891b2",
              backgroundColor: "#0891b2",
              tension: 0.3,
              borderWidth: 3,
              pointRadius: 3
            },
            {
              label: "Squat Jump",
              data: sj,
              borderColor: "#2563eb",
              backgroundColor: "#2563eb",
              tension: 0.3,
              borderWidth: 3,
              pointRadius: 3
            },
            {
              label: "Medicine Ball",
              data: mb,
              borderColor: "#7c3aed",
              backgroundColor: "#7c3aed",
              tension: 0.3,
              borderWidth: 3,
              pointRadius: 3
            }
          ]
        },
        options: baseChartOptions()
      });
    }

    function drawPhaseChart(fases, cmj, sj, mb){
      destroyChart("phaseChart");

      charts.phaseChart = new Chart(document.getElementById("phaseChart"), {
        type: "bar",
        data: {
          labels: fases,
          datasets: [
            {
              label: "CMJ",
              data: cmj,
              backgroundColor: "#0891b2",
              borderRadius: 8
            },
            {
              label: "Squat Jump",
              data: sj,
              backgroundColor: "#2563eb",
              borderRadius: 8
            },
            {
              label: "Medicine Ball",
              data: mb,
              backgroundColor: "#7c3aed",
              borderRadius: 8
            }
          ]
        },
        options: {
          ...baseChartOptions(),
          scales: {
            x: {
              stacked: false,
              ticks: {
                color: "#475569"
              },
              grid: {
                color: "rgba(148,163,184,0.12)"
              }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: "#475569"
              },
              grid: {
                color: "rgba(148,163,184,0.12)"
              }
            }
          }
        }
      });
    }

    function getFilteredAthletesByTeam(team){
      let data = [...rawData];

      if(team !== "Todas"){
        data = data.filter(d => getTeam(d["Nome"]) === team);
      }

      return [...new Set(data.map(d => d["Nome"]).filter(Boolean))].sort();
    }

    function populateAthletesByTeam(){
      const team = document.getElementById("teamFilter").value;
      const select = document.getElementById("athleteFilter");
      const currentValue = select.value;

      const athletes = getFilteredAthletesByTeam(team);

      select.innerHTML = `<option value="Equipe">Equipe (Todos)</option>`;

      athletes.forEach(a => {
        const option = document.createElement("option");
        option.value = a;
        option.textContent = a;
        select.appendChild(option);
      });

      const stillExists = athletes.includes(currentValue);
      select.value = stillExists ? currentValue : "Equipe";
    }

    function updateDashboard(data){
      const athlete = document.getElementById("athleteFilter").value;

      const perf = document.getElementById("performanceSection");
      const perfil = document.getElementById("perfilSection");
      const phase = document.getElementById("phasePerformance");

      const sortedData = sortByTimestamp(data);

      const labels = sortedData.map(d => getDateLabel(d));
      const rec = sortedData.map(d => safe(d["RECUPERAÇÃO"]));
      const rpe = sortedData.map(d => safe(d["ESFORÇO"]));
      const sleep = sortedData.map(d => safe(d["SONO"]));
      const fad = sortedData.map(d => safe(d["FADIGA"]));
      const est = sortedData.map(d => safe(d["ESTRESSE"]));
      const dor = sortedData.map(d => safe(d["DOR"]));

      drawWellness(labels, rec, rpe, sleep, fad, est, dor);

      if(athlete === "Equipe"){
        perf.style.display = "none";
        perfil.style.display = "none";
        phase.style.display = "none";
        destroyChart("performance");
        destroyChart("phaseChart");
        resetAthleteMetrics();
        return;
      }

      perf.style.display = "block";
      perfil.style.display = "block";
      phase.style.display = "block";

      const perfLabels = sortedData.map(d => getDateLabel(d));
      const cmjSeries = sortedData.map(d => safe(d["Média CMJ"]));
      const sjSeries = sortedData.map(d => safe(d["Média Squat Jump"]));
      const mbSeries = sortedData.map(d => safe(d["Arremesso Medicine Ball 1"]));

      drawPerformance(perfLabels, cmjSeries, sjSeries, mbSeries);

      const latest = sortedData[sortedData.length - 1];
      if(latest){
        document.getElementById("cmjMetric").innerText = formatMetric(latest["Média CMJ"]);
        document.getElementById("sjMetric").innerText = formatMetric(latest["Média Squat Jump"]);
        document.getElementById("mbMetric").innerText = formatMetric(latest["Arremesso Medicine Ball 1"]);
      }

      const fases = [...new Set(sortedData.map(d => d["Fase"]).filter(Boolean))];
      const phaseCMJ = [];
      const phaseSJ = [];
      const phaseMB = [];

      fases.forEach(f => {
        const rows = sortedData.filter(r => r["Fase"] === f);
        phaseCMJ.push(mean(rows.map(r => safe(r["Média CMJ"]))));
        phaseSJ.push(mean(rows.map(r => safe(r["Média Squat Jump"]))));
        phaseMB.push(mean(rows.map(r => safe(r["Arremesso Medicine Ball 1"]))));
      });

      drawPhaseChart(fases, phaseCMJ, phaseSJ, phaseMB);
    }

    function applyFilters(){
      const team = document.getElementById("teamFilter").value;
      const athlete = document.getElementById("athleteFilter").value;

      let data = [...rawData];

      if(team !== "Todas"){
        data = data.filter(d => getTeam(d["Nome"]) === team);
      }

      if(athlete !== "Equipe"){
        data = data.filter(d => d["Nome"] === athlete);
      }

      buildAlerts(team);
      updateDashboard(data);
    }

    function attachEvents(){
      document.getElementById("teamFilter").addEventListener("change", () => {
        populateAthletesByTeam();
        applyFilters();
      });

      document.getElementById("athleteFilter").addEventListener("change", applyFilters);
    }

    function load(){
      Papa.parse(sheetURL, {
        download: true,
        header: true,
        complete: function(res){
          rawData = res.data.filter(r => r["Nome"]);
          populateAthletesByTeam();
          buildAlerts();
          applyFilters();
        },
        error: function(err){
          console.error("Erro ao carregar CSV:", err);
          document.getElementById("alerts").innerHTML =
            "<div class='alert-item'>Erro ao carregar os dados da planilha.</div>";
        }
      });
    }

    attachEvents();
    load();
  </script>
</body>
</html>
