<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Science Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#f8fafc;
      --panel:#ffffff;
      --border:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --green:#16a34a;
      --orange:#f59e0b;
      --red:#dc2626;
      --blue:#2563eb;
      --purple:#7c3aed;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:40px;
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:1600px;
      margin:auto;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    .title{
      font-size:32px;
      font-weight:700;
    }

    .subtitle{
      font-size:14px;
      color:var(--muted);
    }

    select{
      background:white;
      border:1px solid var(--border);
      padding:10px 14px;
      border-radius:10px;
      color:var(--text);
      font-size:14px;
      margin-left:10px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      padding:22px;
      border-radius:14px;
      box-shadow:0 6px 18px rgba(0,0,0,0.06);
      margin-bottom:30px;
    }

    .chart-title{
      font-size:16px;
      font-weight:600;
      margin-bottom:10px;
    }

    canvas{
      width:100% !important;
      height:420px !important;
    }

    .alert-box{
      background:#fff7ed;
      border:1px solid #fdba74;
      padding:16px;
      border-radius:12px;
      margin-bottom:30px;
    }

    .alert-item{
      padding:10px 12px;
      margin-bottom:8px;
      border-radius:8px;
      background:#fee2e2;
      color:#7f1d1d;
    }

    .metric-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .metric{
      background:#f1f5f9;
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .metric-value{
      font-size:28px;
      font-weight:700;
    }

    .metric-label{
      font-size:13px;
      color:var(--muted);
    }

    @media (max-width: 900px){
      .metric-grid{
        grid-template-columns:1fr;
      }

      select{
        margin-left:0;
        margin-top:10px;
        width:100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
      <div>
        <div class="title">Athlete Monitoring Dashboard</div>
        <div class="subtitle">Wellness Monitoring</div>
      </div>

      <div>
        <select id="teamFilter">
          <option value="Todas">Todas as Equipes</option>
          <option value="15">Sub 15</option>
          <option value="18">Sub 18</option>
          <option value="21">Sub 21</option>
          <option value="24">Sub 24</option>
        </select>

        <select id="athleteFilter">
          <option value="Equipe">Equipe (Todos)</option>
        </select>
      </div>
    </div>

    <h3>Atletas em Alerta</h3>
    <div class="alert-box" id="alerts"></div>

    <div class="card">
      <div class="chart-title">Wellness Diário</div>
      <canvas id="wellnessChart"></canvas>
    </div>

    <div class="card" id="performanceSection" style="display:none">
      <div class="chart-title">Performance do Atleta ao Longo do Tempo</div>
      <canvas id="performance"></canvas>
    </div>

    <div class="card" id="perfilSection" style="display:none">
      <h3>Perfil do Atleta</h3>
      <div class="metric-grid">
        <div class="metric">
          <div id="cmjMetric" class="metric-value">-</div>
          <div class="metric-label">CMJ</div>
        </div>
        <div class="metric">
          <div id="sjMetric" class="metric-value">-</div>
          <div class="metric-label">Squat Jump</div>
        </div>
        <div class="metric">
          <div id="mbMetric" class="metric-value">-</div>
          <div class="metric-label">Medicine Ball</div>
        </div>
      </div>
    </div>

    <div class="card" id="phasePerformance" style="display:none">
      <div class="chart-title">Performance por Fase</div>
      <canvas id="phaseChart"></canvas>
    </div>

  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2zqGesxYsRhgphN6dpzLhoCCHk54JzzXT7PEFYhLni7uegkBTxRrj8_q3ZzJdN9P77Uum8C078cD8/pub?gid=1108601119&single=true&output=csv";

    let rawData = [];
    let charts = {};

    function mean(arr){
      const valid = arr.filter(v => !isNaN(v));
      return valid.length ? valid.reduce((a,b)=>a+b,0) / valid.length : 0;
    }

    function safe(v){
      if(v === null || v === undefined || v === "") return 0;
      const n = Number(String(v).replace(",", "."));
      return isNaN(n) ? 0 : n;
    }

    function formatMetric(v){
      const n = safe(v);
      return n === 0 ? "-" : n.toFixed(2);
    }

    function getTeam(name){
      if(!name) return "";
      const parts = name.trim().split(" ");
      return parts[parts.length - 1];
    }

    function getDateLabel(row){
      const rawDate = row["Carimbo de data/hora"] || "";
      const date = rawDate.split(" ")[0] || "";
      const fase = row["Fase"] ? ` - ${row["Fase"]}` : "";
      return `${date}${fase}`;
    }

    function sortByTimestamp(data){
      return [...data].sort((a, b) => {
        const da = new Date(a["Carimbo de data/hora"] || 0).getTime();
        const db = new Date(b["Carimbo de data/hora"] || 0).getTime();
        return da - db;
      });
    }

    function buildAlerts(filteredTeam = "Todas"){
      const container = document.getElementById("alerts");
      container.innerHTML = "";

      let alertData = [...rawData];

      if(filteredTeam !== "Todas"){
        alertData = alertData.filter(d => getTeam(d["Nome"]) === filteredTeam);
      }

      const athletes = [...new Set(alertData.map(d => d["Nome"]).filter(Boolean))];

      athletes.forEach(a => {
        const rows = sortByTimestamp(alertData.filter(r => r["Nome"] === a));
        const last = rows[rows.length - 1];
        if(!last) return;

        const rec = safe(last["RECUPERAÇÃO"]);
        const sono = safe(last["SONO"]);
        const fad = safe(last["FADIGA"]);
        const est = safe(last["ESTRESSE"]);
        const dor = safe(last["DOR"]);

        let issues = [];

        if(rec < 6) issues.push("Recuperação < 6");
        if(sono < 4) issues.push("Sono < 4");
        if(fad < 4) issues.push("Fadiga < 4");
        if(est < 4) issues.push("Estresse < 4");
        if(dor < 4) issues.push("Dor < 4");

        if(issues.length > 0){
          const div = document.createElement("div");
          div.className = "alert-item";
          div.innerHTML = `<strong>${a}</strong> → ${issues.join(", ")}`;
          container.appendChild(div);
        }
      });

      if(container.innerHTML === ""){
        container.innerHTML = "<div style='color:green;font-weight:600'>Nenhum alerta</div>";
      }
    }

    function drawWellness(labels, rec, rpe, sleep, fad, est, dor){
      if(charts.wellnessChart) charts.wellnessChart.destroy();

      charts.wellnessChart = new Chart(document.getElementById("wellnessChart"), {
        type: "line",
        data: {
          labels: labels,
          datasets: [
            {
              label: "Recuperação",
              data: rec,
              borderColor: "#16a34a",
              backgroundColor: "#16a34a",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 4
            },
            {
              label: "Esforço",
              data: rpe,
              borderColor: "#f59e0b",
              backgroundColor: "#f59e0b",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 4
            },
            {
              label: "Sono",
              data: sleep,
              borderColor: "#2563eb",
              backgroundColor: "#2563eb",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 4
            },
            {
              label: "Fadiga",
              data: fad,
              borderColor: "#f97316",
              backgroundColor: "#f97316",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 4
            },
            {
              label: "Estresse",
              data: est,
              borderColor: "#dc2626",
              backgroundColor: "#dc2626",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 4
            },
            {
              label: "Dor",
              data: dor,
              borderColor: "#7c3aed",
              backgroundColor: "#7c3aed",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                font: {
                  size: 14,
                  weight: "600"
                }
              }
            },
            annotation: {
              annotations: {
                zonaCritica: {
                  type: "box",
                  yMin: 0,
                  yMax: 6,
                  backgroundColor: "rgba(220,38,38,0.12)",
                  borderWidth: 0
                },
                zonaAlerta: {
                  type: "box",
                  yMin: 6,
                  yMax: 7,
                  backgroundColor: "rgba(234,179,8,0.18)",
                  borderWidth: 0
                },
                zonaIdeal: {
                  type: "box",
                  yMin: 7,
                  yMax: 10,
                  backgroundColor: "rgba(34,197,94,0.15)",
                  borderWidth: 0
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: "#475569",
                maxRotation: 45,
                minRotation: 30
              },
              grid: {
                color: "rgba(148,163,184,0.15)"
              }
            },
            y: {
              min: 0,
              max: 10,
              ticks: {
                stepSize: 1,
                color: "#475569"
              },
              grid: {
                color: "rgba(148,163,184,0.15)"
              }
            }
          }
        }
      });
    }

    function drawPerformance(labels, cmj, sj, mb){
      if(charts.performance) charts.performance.destroy();

      charts.performance = new Chart(document.getElementById("performance"), {
        type: "line",
        data: {
          labels: labels,
          datasets: [
            {
              label: "CMJ",
              data: cmj,
              borderColor: "#0891b2",
              backgroundColor: "#0891b2",
              tension: 0.3,
              borderWidth: 3,
              pointRadius: 4
            },
            {
              label: "Squat Jump",
              data: sj,
              borderColor: "#2563eb",
              backgroundColor: "#2563eb",
              tension: 0.3,
              borderWidth: 3,
              pointRadius: 4
            },
            {
              label: "Medicine Ball",
              data: mb,
              borderColor: "#7c3aed",
              backgroundColor: "#7c3aed",
              tension: 0.3,
              borderWidth: 3,
              pointRadius: 4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                font: {
                  size: 14,
                  weight: "600"
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: "#475569",
                maxRotation: 45,
                minRotation: 30
              },
              grid: {
                color: "rgba(148,163,184,0.15)"
              }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: "#475569"
              },
              grid: {
                color: "rgba(148,163,184,0.15)"
              }
            }
          }
        }
      });
    }

    function drawPhaseChart(fases, cmj, sj, mb){
      if(charts.phaseChart) charts.phaseChart.destroy();

      charts.phaseChart = new Chart(document.getElementById("phaseChart"), {
        type: "bar",
        data: {
          labels: fases,
          datasets: [
            {
              label: "CMJ",
              data: cmj,
              backgroundColor: "#0891b2"
            },
            {
              label: "Squat Jump",
              data: sj,
              backgroundColor: "#2563eb"
            },
            {
              label: "Medicine Ball",
              data: mb,
              backgroundColor: "#7c3aed"
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                font: {
                  size: 14,
                  weight: "600"
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: "#475569"
              },
              grid: {
                color: "rgba(148,163,184,0.15)"
              }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: "#475569"
              },
              grid: {
                color: "rgba(148,163,184,0.15)"
              }
            }
          }
        }
      });
    }

    function updateDashboard(data){
      const athlete = document.getElementById("athleteFilter").value;
      const perf = document.getElementById("performanceSection");
      const perfil = document.getElementById("perfilSection");
      const phase = document.getElementById("phasePerformance");

      const sortedData = sortByTimestamp(data);

      const labels = sortedData.map(d => getDateLabel(d));
      const rec = sortedData.map(d => safe(d["RECUPERAÇÃO"]));
      const rpe = sortedData.map(d => safe(d["ESFORÇO"]));
      const sleep = sortedData.map(d => safe(d["SONO"]));
      const fad = sortedData.map(d => safe(d["FADIGA"]));
      const est = sortedData.map(d => safe(d["ESTRESSE"]));
      const dor = sortedData.map(d => safe(d["DOR"]));

      drawWellness(labels, rec, rpe, sleep, fad, est, dor);

      if(athlete === "Equipe"){
        perf.style.display = "none";
        perfil.style.display = "none";
        phase.style.display = "none";

        if(charts.performance){
          charts.performance.destroy();
          charts.performance = null;
        }

        if(charts.phaseChart){
          charts.phaseChart.destroy();
          charts.phaseChart = null;
        }

        document.getElementById("cmjMetric").innerText = "-";
        document.getElementById("sjMetric").innerText = "-";
        document.getElementById("mbMetric").innerText = "-";
      } else {
        perf.style.display = "block";
        perfil.style.display = "block";
        phase.style.display = "block";

        const perfLabels = sortedData.map(d => getDateLabel(d));
        const cmjSeries = sortedData.map(d => safe(d["Média CMJ"]));
        const sjSeries = sortedData.map(d => safe(d["Média Squat Jump"]));
        const mbSeries = sortedData.map(d => safe(d["Arremesso Medicine Ball 1"]));

        drawPerformance(perfLabels, cmjSeries, sjSeries, mbSeries);

        const latest = sortedData[sortedData.length - 1];
        if(latest){
          document.getElementById("cmjMetric").innerText = formatMetric(latest["Média CMJ"]);
          document.getElementById("sjMetric").innerText = formatMetric(latest["Média Squat Jump"]);
          document.getElementById("mbMetric").innerText = formatMetric(latest["Arremesso Medicine Ball 1"]);
        }

        const fases = [...new Set(sortedData.map(d => d["Fase"]).filter(Boolean))];

        const phaseCMJ = [];
        const phaseSJ = [];
        const phaseMB = [];

        fases.forEach(f => {
          const rows = sortedData.filter(r => r["Fase"] === f);
          phaseCMJ.push(mean(rows.map(r => safe(r["Média CMJ"]))));
          phaseSJ.push(mean(rows.map(r => safe(r["Média Squat Jump"]))));
          phaseMB.push(mean(rows.map(r => safe(r["Arremesso Medicine Ball 1"]))));
        });

        drawPhaseChart(fases, phaseCMJ, phaseSJ, phaseMB);
      }
    }

    function applyFilters(){
      const team = document.getElementById("teamFilter").value;
      const athlete = document.getElementById("athleteFilter").value;

      let data = [...rawData];

      if(team !== "Todas"){
        data = data.filter(d => getTeam(d["Nome"]) === team);
      }

      if(athlete !== "Equipe"){
        data = data.filter(d => d["Nome"] === athlete);
      }

      buildAlerts(team);
      updateDashboard(data);
    }

    function populateAthletes(){
      const select = document.getElementById("athleteFilter");
      select.innerHTML = `<option value="Equipe">Equipe (Todos)</option>`;

      const athletes = [...new Set(rawData.map(d => d["Nome"]).filter(Boolean))].sort();

      athletes.forEach(a => {
        const option = document.createElement("option");
        option.value = a;
        option.text = a;
        select.appendChild(option);
      });

      select.addEventListener("change", applyFilters);
      document.getElementById("teamFilter").addEventListener("change", applyFilters);
    }

    function load(){
      Papa.parse(sheetURL, {
        download: true,
        header: true,
        complete: function(res){
          rawData = res.data.filter(r => r["Nome"]);
          populateAthletes();
          buildAlerts();
          updateDashboard(rawData);
        },
        error: function(err){
          console.error("Erro ao carregar CSV:", err);
          document.getElementById("alerts").innerHTML =
            "<div class='alert-item'>Erro ao carregar os dados da planilha.</div>";
        }
      });
    }

    load();
  </script>
</body>
</html>
