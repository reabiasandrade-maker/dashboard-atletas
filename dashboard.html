<script>
  const MONITORAMENTO_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2zqGesxYsRhgphN6dpzLhoCCHk54JzzXT7PEFYhLni7uegkBTxRrj8_q3ZzJdN9P77Uum8C078cD8/pub?gid=1108601119&single=true&output=csv";
  const DESEMPENHO_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2zqGesxYsRhgphN6dpzLhoCCHk54JzzXT7PEFYhLni7uegkBTxRrj8_q3ZzJdN9P77Uum8C078cD8/pub?gid=1791609294&single=true&output=csv";
  const COMPOSICAO_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2zqGesxYsRhgphN6dpzLhoCCHk54JzzXT7PEFYhLni7uegkBTxRrj8_q3ZzJdN9P77Uum8C078cD8/pub?gid=1621298071&single=true&output=csv";

  let monitoramentoData = [];
  let desempenhoData = [];
  let composicaoData = [];
  let charts = {};
  let currentAlertsData = [];

  function safe(v){
    if(v === null || v === undefined || String(v).trim() === "") return 0;
    const n = Number(String(v).replace(",", "."));
    return isNaN(n) ? 0 : n;
  }

  function safeNullable(v){
    if(v === null || v === undefined || String(v).trim() === "") return null;
    const n = Number(String(v).replace(",", "."));
    return isNaN(n) ? null : n;
  }

  function fmtMetric(v){
    const n = safe(v);
    return n ? n.toFixed(2) : "-";
  }

  function averageOrNull(arr){
    const valid = arr.filter(v => v !== null && v !== undefined && !isNaN(v));
    if(!valid.length) return null;
    return valid.reduce((a,b)=>a+b,0) / valid.length;
  }

  function normalizeText(v){
    return String(v || "")
      .trim()
      .replace(/\s+/g, " ")
      .toLowerCase();
  }

  function getName(row){
    return String(
      row["Nome"] ||
      row["NOME"] ||
      row["Atleta"] ||
      row["ATLETA"] ||
      row["atleta"] ||
      ""
    ).trim();
  }

  function getTeamFromRow(row){
    return String(
      row["Equipe"] ||
      row["EQUIPE"] ||
      row["equipe"] ||
      row["Categoria"] ||
      row["CATEGORIA"] ||
      row["categoria"] ||
      ""
    ).trim();
  }

  function getTeam(name){
    if(!name) return "";
    const parts = String(name).trim().split(" ");
    return parts[parts.length - 1];
  }

  function rowMatchesTeam(row, selectedTeam){
    if(selectedTeam === "Todas") return true;

    const teamFromColumn = getTeamFromRow(row);
    if(teamFromColumn){
      return normalizeText(teamFromColumn) === normalizeText(selectedTeam);
    }

    return normalizeText(getTeam(getName(row))) === normalizeText(selectedTeam);
  }

  function rowMatchesAthlete(row, selectedAthlete){
    if(selectedAthlete === "Equipe") return true;
    return normalizeText(getName(row)) === normalizeText(selectedAthlete);
  }

  function getTimestampFromAnyDate(raw){
    if(!raw) return 0;

    const s = String(raw).trim();
    if(!s) return 0;

    const [datePart, timePart = "00:00:00"] = s.split(" ");
    const d = datePart.split("/");

    if(d.length === 3){
      const day = d[0].padStart(2, "0");
      const month = d[1].padStart(2, "0");
      const year = d[2];
      return new Date(`${year}-${month}-${day}T${timePart}`).getTime();
    }

    const iso = new Date(s).getTime();
    return isNaN(iso) ? 0 : iso;
  }

  function getDateTimeValue(row){
    return getTimestampFromAnyDate(
      row["Carimbo de data/hora"] ||
      row["Data"] ||
      row["DATA"] ||
      row["data"] ||
      ""
    );
  }

  function sortByTimestamp(data){
    return [...data].sort((a,b) => getDateTimeValue(a) - getDateTimeValue(b));
  }

  function formatDateBR(dateString){
    if(!dateString) return "";
    const onlyDate = String(dateString).split(" ")[0];
    const parts = onlyDate.split("/");
    if(parts.length === 3){
      return `${parts[0]}/${parts[1]}`;
    }
    return onlyDate;
  }

  function getShiftLabel(row){
    const raw = String(
      row["Turno"] ||
      row["TREINO"] ||
      row["Treino"] ||
      row["treino"] ||
      row["Fase"] ||
      ""
    ).trim().toLowerCase();

    if(
      raw === "1" ||
      raw === "turno 1" ||
      raw === "treino 1" ||
      raw === "fase 1" ||
      raw.includes("treino 1") ||
      raw.includes("turno 1") ||
      raw === "manhã" ||
      raw === "manha"
    ){
      return "Manhã";
    }

    if(
      raw === "2" ||
      raw === "turno 2" ||
      raw === "treino 2" ||
      raw === "fase 2" ||
      raw.includes("treino 2") ||
      raw.includes("turno 2") ||
      raw === "tarde"
    ){
      return "Tarde";
    }

    return raw ? raw : "";
  }

  function getDateLabel(row){
    const date = formatDateBR(row["Carimbo de data/hora"] || row["Data"] || "");
    const shift = getShiftLabel(row);
    return shift ? `${date} • ${shift}` : date;
  }

  function getPhase(row){
    return String(
      row["Fase"] ||
      row["FASE"] ||
      row["fase"] ||
      row["Etapa"] ||
      row["ETAPA"] ||
      ""
    ).trim();
  }

  function destroyChart(name){
    if(charts[name]){
      charts[name].destroy();
      charts[name] = null;
    }
  }

  function destroyAthleteCharts(){
    destroyChart("cmjPhaseChart");
    destroyChart("sjPhaseChart");
    destroyChart("mbPhaseChart");
    destroyChart("vo2Chart");
    destroyChart("bodyCompChart");
  }

  function resetAthleteMetrics(){
    document.getElementById("cmjMetric").innerText = "-";
    document.getElementById("sjMetric").innerText = "-";
    document.getElementById("mbMetric").innerText = "-";
    document.getElementById("vo2Metric").innerText = "-";
  }

  function getFilteredMonitoramentoData(){
    const team = document.getElementById("teamFilter").value;
    const athlete = document.getElementById("athleteFilter").value;

    return monitoramentoData.filter(d => rowMatchesTeam(d, team) && rowMatchesAthlete(d, athlete));
  }

  function getFilteredDesempenhoData(){
    const team = document.getElementById("teamFilter").value;
    const athlete = document.getElementById("athleteFilter").value;

    return desempenhoData.filter(d => rowMatchesTeam(d, team) && rowMatchesAthlete(d, athlete));
  }

  function getFilteredComposicaoData(){
    const team = document.getElementById("teamFilter").value;
    const athlete = document.getElementById("athleteFilter").value;

    return composicaoData.filter(d => rowMatchesTeam(d, team) && rowMatchesAthlete(d, athlete));
  }

  function getAthletesFromData(data){
    return [...new Set(data.map(d => getName(d)).filter(Boolean))].sort((a,b)=>a.localeCompare(b, "pt-BR"));
  }

  function getLatestRowByAthlete(data){
    const athletes = getAthletesFromData(data);
    const result = [];

    athletes.forEach(name => {
      const rows = sortByTimestamp(data.filter(r => normalizeText(getName(r)) === normalizeText(name)));
      const last = rows[rows.length - 1];
      if(last) result.push(last);
    });

    return result;
  }

  function getHeatmapEligibleRows(data){
    const latestRows = getLatestRowByAthlete(data);

    return latestRows.filter(row => {
      const vals = [
        safeNullable(row["RECUPERAÇÃO"]),
        safeNullable(row["SONO"]),
        safeNullable(row["FADIGA"]),
        safeNullable(row["ESTRESSE"]),
        safeNullable(row["DOR"])
      ];
      return vals.some(v => v !== null);
    });
  }

  function getReadinessColor(v){
    if(v < 4) return "#fecaca";
    if(v < 7) return "#fde68a";
    return "#bbf7d0";
  }

  function getTrainingLoad(row){
    const esforco = safeNullable(row["ESFORÇO"]);
    const tempo = safeNullable(
      row["TEMPO SESSÃO"] ||
      row["TEMPO DA SESSÃO"] ||
      row["TEMPO SESSAO"] ||
      row["DURAÇÃO"] ||
      row["DURACAO"] ||
      row["TEMPO"]
    );
    if(esforco === null || tempo === null) return null;
    return esforco * tempo;
  }

  function getVO2(row){
    return safe(
      row["VO2MAX"] ||
      row["VO2 MAX"] ||
      row["VO₂MAX"] ||
      row["VO2"] ||
      row["VO2máx"] ||
      row["VO2 MÁX"] ||
      row["VO2 Max"] ||
      row["VO2max"]
    );
  }

  function getPeso(row){
    return safe(
      row["PESO"] ||
      row["Peso"] ||
      row["MASSA CORPORAL"] ||
      row["Massa corporal"]
    );
  }

  function getPctG(row){
    return safe(
      row["%G"] ||
      row["% G"] ||
      row["PERCENTUAL DE GORDURA"] ||
      row["% DE GORDURA"] ||
      row["GORDURA %"] ||
      row["Percentual de gordura"]

  }

  function getMassaGorda(row){
    return safe(
      row["MASSA GORDA"] ||
      row["Massa gorda"] ||
      row["Massa Gorda"] ||
      row["KG GORDURA"] ||
      row["GORDURA KG"] ||
      row["Massa gorda (kg)"] ||
      row["Gordura (kg)"]
    );
  }

  function getMassaMagra(row){
    return safe(
      row["MASSA MAGRA"] ||
      row["Massa magra"] ||
      row["Massa Magra"] ||
      row["MM"] ||
      row["MASSA LIVRE DE GORDURA"] ||
      row["MLG"] ||
      row["Massa magra (kg)"] ||
      row["Massa livre de gordura"]
    );
  }

  function getPctMassaMagra(row){
    return safe(
      row["% MASSA MAGRA"] ||
      row["% DE MASSA MAGRA"] ||
      row["PERCENTUAL DE MASSA MAGRA"] ||
      row["MASSA MAGRA %"] ||
      row["% Massa Magra"] ||
      row["Percentual de massa magra"]
    );
  }

  function getArremesso(row){
    const a1 = safeNullable(
      row["Arremesso Medicine Ball 1"] ||
      row["Arremesso 1"] ||
      row["Arremesso MB 1"]
    );

    const a2 = safeNullable(
      row["Arremesso Medicine Ball 2"] ||
      row["Arremesso 2"] ||
      row["Arremesso MB 2"]
    );

    const a3 = safeNullable(
      row["Arremesso Medicine Ball 3"] ||
      row["Arremesso 3"] ||
      row["Arremesso MB 3"]
    );

    const mediaDireta = safeNullable(
      row["Média Arremesso"] ||
      row["MEDIA ARREMESSO"] ||
      row["Arremesso"] ||
      row["ARREMESSO"]
    );

    const valores = [a1, a2, a3].filter(v => v !== null && !isNaN(v));

    if(valores.length) return valores.reduce((a,b)=>a+b,0) / valores.length;
    if(mediaDireta !== null) return mediaDireta;

    return 0;
  }

  function getAbsolutePhaseValue(rows, getter){
    const valores = rows
      .map(r => getter(r))
      .filter(v => v !== null && v !== undefined && !isNaN(v) && v !== 0);

    if(!valores.length) return 0;
    return valores[valores.length - 1];
  }

      type:"line",

        labels,
        datasets:[
          { label:"Peso", data:peso, borderColor:"#0f766e", backgroundColor:"#0f766e", tension:0.25, borderWidth:3, pointRadius:3 },

  function getAlertsDetails(data){
    const latestRows = getLatestRowByAthlete(data);
    const alerts = [];

    latestRows.forEach(row => {
      const issues = [];
      const rec = safeNullable(row["RECUPERAÇÃO"]);
      const sono = safeNullable(row["SONO"]);
      const fad = safeNullable(row["FADIGA"]);
      const est = safeNullable(row["ESTRESSE"]);
      const dor = safeNullable(row["DOR"]);

      if(rec !== null && rec < 6) issues.push("Recuperação < 6");
      if(sono !== null && sono < 4) issues.push("Sono < 4");
      if(fad !== null && fad < 4) issues.push("Fadiga < 4");
      if(est !== null && est < 4) issues.push("Estresse < 4");
      if(dor !== null && dor < 4) issues.push("Dor < 4");

      if(issues.length){
        alerts.push({ nome: getName(row), criterios: issues });
      }
    });

    return alerts;
  }

  function updateAlertsKPI(data){
    currentAlertsData = getAlertsDetails(data);
    document.getElementById("kpiAlerts").innerText = currentAlertsData.length;
  }

  function openAlertsModal(){
    const modal = document.getElementById("alertsModal");
    const list = document.getElementById("alertsModalList");
    list.innerHTML = "";

    if(!currentAlertsData.length){
      list.innerHTML = `<div class="modal-empty">Nenhum atleta em alerta no filtro atual.</div>`;
    } else {
      currentAlertsData.forEach(item => {
        const div = document.createElement("div");
        div.className = "modal-alert-item";

        const criteriaHtml = item.criterios
          .map(c => `<span class="criterion-tag">${c}</span>`)
          .join("");

        div.innerHTML = `
          <div class="modal-alert-name">${item.nome}</div>
          <div class="modal-alert-criteria">${criteriaHtml}</div>
        `;
        list.appendChild(div);
      });
    }

    modal.classList.add("show");
  }

  function closeAlertsModal(){
    document.getElementById("alertsModal").classList.remove("show");
  }

  function buildHeatmap(data){
    const container = document.getElementById("heatmap");
    container.innerHTML = "";

    const eligibleRows = getHeatmapEligibleRows(data);

    if(!eligibleRows.length){
      container.innerHTML = `<div class="modal-empty">Sem dados para exibir heatmap</div>`;
      return;
    }

    eligibleRows.forEach(row => {
      const metrics = [
        {label:"R", value:safeNullable(row["RECUPERAÇÃO"])},
        {label:"S", value:safeNullable(row["SONO"])},
        {label:"F", value:safeNullable(row["FADIGA"])},
        {label:"E", value:safeNullable(row["ESTRESSE"])},
        {label:"D", value:safeNullable(row["DOR"])}
      ];

      const wrap = document.createElement("div");
      wrap.className = "heat-row";

      const name = document.createElement("div");
      name.className = "heat-name";
      name.textContent = getName(row);
      wrap.appendChild(name);

      metrics.forEach(m => {
        const cell = document.createElement("div");
        cell.className = "heat-cell";

        if(m.value === null){
          cell.style.background = "#f8fafc";
          cell.style.border = "1px solid #e2e8f0";
          cell.style.color = "#94a3b8";
          cell.title = `${m.label}: sem dado`;
          cell.innerText = "-";
        } else {
          cell.style.background = getReadinessColor(m.value);
          cell.title = `${m.label}: ${m.value}`;
          cell.innerText = m.value.toFixed(0);
        }

        wrap.appendChild(cell);
      });

      container.appendChild(wrap);
    });
  }

  function updateKPIs(data){
    const eligibleRows = getHeatmapEligibleRows(data);
    document.getElementById("kpiAthletes").innerText = eligibleRows.length;
  }

  function updateAthleteSection(){
    const athlete = document.getElementById("athleteFilter").value;
    const perfil = document.getElementById("perfilSection");
    const chartsSection = document.getElementById("athleteChartsSection");

    if(athlete === "Equipe"){
      perfil.style.display = "none";
      chartsSection.style.display = "none";
      destroyAthleteCharts();
      resetAthleteMetrics();
      return;
    }

    const desempenho = sortByTimestamp(getFilteredDesempenhoData());
    const composicao = sortByTimestamp(getFilteredComposicaoData());

    perfil.style.display = "block";
    chartsSection.style.display = "grid";

    if(!desempenho.length && !composicao.length){
      destroyAthleteCharts();
      resetAthleteMetrics();
      return;
    }

    const latestDesempenho = desempenho.length ? desempenho[desempenho.length - 1] : null;

    document.getElementById("cmjMetric").innerText = latestDesempenho ? fmtMetric(latestDesempenho["Média CMJ"] || latestDesempenho["CMJ"]) : "-";
    document.getElementById("sjMetric").innerText = latestDesempenho ? fmtMetric(latestDesempenho["Média Squat Jump"] || latestDesempenho["Squat Jump"] || latestDesempenho["SJ"]) : "-";
    document.getElementById("mbMetric").innerText = latestDesempenho ? fmtMetric(getArremesso(latestDesempenho)) : "-";
    document.getElementById("vo2Metric").innerText = latestDesempenho ? fmtMetric(getVO2(latestDesempenho)) : "-";

    const fasesDesempenho = [...new Set(desempenho.map(d => getPhase(d)).filter(Boolean))];
    const cmjPhase = [];
    const sjPhase = [];
    const mbPhase = [];
    const vo2Phase = [];

    fasesDesempenho.forEach(f => {
      const rows = desempenho.filter(r => getPhase(r) === f);
      cmjPhase.push(getAbsolutePhaseValue(rows, r => safe(r["Média CMJ"] || r["CMJ"])));
      sjPhase.push(getAbsolutePhaseValue(rows, r => safe(r["Média Squat Jump"] || r["Squat Jump"] || r["SJ"])));
      mbPhase.push(getAbsolutePhaseValue(rows, r => getArremesso(r)));
      vo2Phase.push(getAbsolutePhaseValue(rows, r => getVO2(r)));
    });

    drawSinglePhaseBarChart("cmjPhaseChart", "cmjPhaseChart", "CMJ", fasesDesempenho, cmjPhase, "#0891b2");
    drawSinglePhaseBarChart("sjPhaseChart", "sjPhaseChart", "Squat Jump", fasesDesempenho, sjPhase, "#2563eb");
    drawSinglePhaseBarChart("mbPhaseChart", "mbPhaseChart", "Arremesso", fasesDesempenho, mbPhase, "#7c3aed");
    drawVO2Chart(fasesDesempenho, vo2Phase);

    const fasesComposicao = [...new Set(composicao.map(d => getPhase(d)).filter(Boolean))];
    const pesoPhase = [];
    const pctGPhase = [];
    const massaGordaPhase = [];
    const massaMagraPhase = [];
    const pctMassaMagraPhase = [];

    fasesComposicao.forEach(f => {
      const rows = composicao.filter(r => getPhase(r) === f);
      pesoPhase.push(getAbsolutePhaseValue(rows, r => getPeso(r)));
      pctGPhase.push(getAbsolutePhaseValue(rows, r => getPctG(r)));
      massaGordaPhase.push(getAbsolutePhaseValue(rows, r => getMassaGorda(r)));
      massaMagraPhase.push(getAbsolutePhaseValue(rows, r => getMassaMagra(r)));
      pctMassaMagraPhase.push(getAbsolutePhaseValue(rows, r => getPctMassaMagra(r)));
    });

    drawBodyCompChart(
      fasesComposicao,
      pesoPhase,
      pctGPhase,
      massaGordaPhase,
      massaMagraPhase,
      pctMassaMagraPhase
    );
  }

  function buildTeamWellnessSeries(data){
    const grouped = {};

    data.forEach(row => {
      const rawDate = row["Carimbo de data/hora"] || "";
      const onlyDate = rawDate.split(" ")[0] || "";
      const shift = getShiftLabel(row);

      if(!onlyDate || !shift) return;

      const key = `${onlyDate}__${shift}`;

      if(!grouped[key]){
        grouped[key] = {
          date: onlyDate,
          shift: shift,
          rec: [],
          rpe: [],
          sleep: [],
          fad: [],
          est: [],
          dor: [],
          load: []
        };
      }

      const recVal = safeNullable(row["RECUPERAÇÃO"]);
      const rpeVal = safeNullable(row["ESFORÇO"]);
      const sleepVal = safeNullable(row["SONO"]);
      const fadVal = safeNullable(row["FADIGA"]);
      const estVal = safeNullable(row["ESTRESSE"]);
      const dorVal = safeNullable(row["DOR"]);
      const loadVal = getTrainingLoad(row);

      if(recVal !== null) grouped[key].rec.push(recVal);
      if(rpeVal !== null) grouped[key].rpe.push(rpeVal);
      if(sleepVal !== null) grouped[key].sleep.push(sleepVal);
      if(fadVal !== null) grouped[key].fad.push(fadVal);
      if(estVal !== null) grouped[key].est.push(estVal);
      if(dorVal !== null) grouped[key].dor.push(dorVal);
      if(loadVal !== null) grouped[key].load.push(loadVal);
    });

    const orderedGroups = Object.values(grouped).sort((a, b) => {
      const [da, ma, aa] = a.date.split("/");
      const [db, mb, ab] = b.date.split("/");
      const ta = new Date(`${aa}-${ma.padStart(2,"0")}-${da.padStart(2,"0")}T${a.shift === "Manhã" ? "08:00:00" : "16:00:00"}`).getTime();
      const tb = new Date(`${ab}-${mb.padStart(2,"0")}-${db.padStart(2,"0")}T${b.shift === "Manhã" ? "08:00:00" : "16:00:00"}`).getTime();
      return ta - tb;
    });

    return {
      labels: orderedGroups.map(g => `${formatDateBR(g.date)} • ${g.shift}`),
      rec: orderedGroups.map(g => averageOrNull(g.rec)),
      rpe: orderedGroups.map(g => averageOrNull(g.rpe)),
      sleep: orderedGroups.map(g => averageOrNull(g.sleep)),
      fad: orderedGroups.map(g => averageOrNull(g.fad)),
      est: orderedGroups.map(g => averageOrNull(g.est)),
      dor: orderedGroups.map(g => averageOrNull(g.dor)),
      loadData: orderedGroups.map(g => averageOrNull(g.load))
    };
  }

  function updateDashboard(){
    const monitorData = sortByTimestamp(getFilteredMonitoramentoData());
    const athlete = document.getElementById("athleteFilter").value;

    const heatmapCard = document.getElementById("heatmapCard");
    const kpiAlertsCard = document.getElementById("kpiAlertsCard");
    const kpiAthletesCard = document.getElementById("kpiAthletesCard");

    updateKPIs(monitorData);

    if(athlete === "Equipe"){
      heatmapCard.style.display = "block";
      kpiAlertsCard.style.display = "block";
      kpiAthletesCard.style.display = "block";
      updateAlertsKPI(monitorData);
      buildHeatmap(monitorData);
    } else {
      heatmapCard.style.display = "none";
      kpiAlertsCard.style.display = "none";
      kpiAthletesCard.style.display = "none";
      document.getElementById("kpiAlerts").innerText = "0";
      currentAlertsData = [];
    }

    let labels = [];
    let rec = [];
    let rpe = [];
    let sleep = [];
    let fad = [];
    let est = [];
    let dor = [];
    let loadData = [];

    if(athlete === "Equipe"){
      const teamSeries = buildTeamWellnessSeries(monitorData);
      labels = teamSeries.labels;
      rec = teamSeries.rec;
      rpe = teamSeries.rpe;
      sleep = teamSeries.sleep;
      fad = teamSeries.fad;
      est = teamSeries.est;
      dor = teamSeries.dor;
      loadData = teamSeries.loadData;
    } else {
      labels = monitorData.map(d => getDateLabel(d));
      rec = monitorData.map(d => safeNullable(d["RECUPERAÇÃO"]));
      rpe = monitorData.map(d => safeNullable(d["ESFORÇO"]));
      sleep = monitorData.map(d => safeNullable(d["SONO"]));
      fad = monitorData.map(d => safeNullable(d["FADIGA"]));
      est = monitorData.map(d => safeNullable(d["ESTRESSE"]));
      dor = monitorData.map(d => safeNullable(d["DOR"]));
      loadData = monitorData.map(d => getTrainingLoad(d));
    }

    drawWellness(labels, rec, rpe, sleep, fad, est, dor, loadData);
    updateAthleteSection();
  }

  function getAllAthletes(){
    return getAthletesFromData([
      ...monitoramentoData,
      ...desempenhoData,
      ...composicaoData
    ]);
  }

  function getFilteredAthletesByTeam(){
    const team = document.getElementById("teamFilter").value;
    const allRows = [
      ...monitoramentoData,
      ...desempenhoData,
      ...composicaoData
    ];

    const filtered = allRows.filter(r => rowMatchesTeam(r, team));
    return getAthletesFromData(filtered);
  }

  function populateAthletesByTeam(){
    const select = document.getElementById("athleteFilter");
    const current = select.value;
    const athletes = getFilteredAthletesByTeam();

    select.innerHTML = `<option value="Equipe">Equipe (Todos)</option>`;

    athletes.forEach(a => {
      const option = document.createElement("option");
      option.value = a;
      option.textContent = a;
      select.appendChild(option);
    });

    select.value = athletes.some(a => normalizeText(a) === normalizeText(current)) ? current : "Equipe";
  }

  function attachEvents(){
    document.getElementById("teamFilter").addEventListener("change", () => {
      populateAthletesByTeam();
      updateDashboard();
    });

    document.getElementById("athleteFilter").addEventListener("change", updateDashboard);

    document.getElementById("kpiAlertsCard").addEventListener("click", () => {
      if(document.getElementById("athleteFilter").value === "Equipe"){
        openAlertsModal();
      }
    });

    document.getElementById("closeAlertsModal").addEventListener("click", closeAlertsModal);

    document.getElementById("alertsModal").addEventListener("click", (e) => {
      if(e.target.id === "alertsModal"){
        closeAlertsModal();
      }
    });

    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape"){
        closeAlertsModal();
      }
    });
  }

  function parseCsv(url){
    return new Promise((resolve, reject) => {
      Papa.parse(url, {
        download:true,
        header:true,
        skipEmptyLines:true,
        complete:(res) => resolve(res.data || []),
        error:(err) => reject(err)
      });
    });
  }

  async function load(){
    try{
      const [monitorRows, desempenhoRows, composicaoRows] = await Promise.all([
        parseCsv(MONITORAMENTO_URL),
        parseCsv(DESEMPENHO_URL),
        parseCsv(COMPOSICAO_URL)
      ]);

      monitoramentoData = monitorRows.filter(r => getName(r));
      desempenhoData = desempenhoRows.filter(r => getName(r));
      composicaoData = composicaoRows.filter(r => getName(r));

      populateAthletesByTeam();
      updateDashboard();
    }catch(err){
      console.error("Erro ao carregar planilhas:", err);
      alert("Erro ao carregar os dados das abas do Google Sheets.");
    }
  }

  attachEvents();
  load();
</script>
