<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Science Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script>
// registrar plugin de anotação corretamente
if (window.ChartAnnotation) {
  Chart.register(window.ChartAnnotation);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f8fafc;
--panel:#ffffff;
--border:#e5e7eb;
--text:#0f172a;
--muted:#64748b;
--green:#16a34a;
--orange:#f59e0b;
--red:#dc2626;
--blue:#2563eb;
--purple:#7c3aed;
}

*{box-sizing:border-box}

body{
margin:0;
padding:40px;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

.container{max-width:1600px;margin:auto}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}

.title{font-size:32px;font-weight:700}
.subtitle{font-size:14px;color:var(--muted)}

select{
background:white;
border:1px solid var(--border);
padding:10px 14px;
border-radius:10px;
color:var(--text);
font-size:14px;
margin-left:10px
}

.card{
background:var(--panel);
border:1px solid var(--border);
padding:22px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
margin-bottom:30px
}

.chart-title{font-size:16px;font-weight:600;margin-bottom:10px}

canvas{width:100%!important;height:380px!important}

.alert-box{
background:#fff7ed;
border:1px solid #fdba74;
padding:16px;
border-radius:12px;
margin-bottom:30px
}

.alert-item{
padding:10px 12px;
margin-bottom:8px;
border-radius:8px;
background:#fee2e2;
color:#7f1d1d
}

.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.metric{background:#f1f5f9;padding:20px;border-radius:12px;text-align:center}
.metric-value{font-size:28px;font-weight:700}
.metric-label{font-size:13px;color:var(--muted)}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div>
<div class="title">Athlete Monitoring Dashboard</div>
<div class="subtitle">Wellness Monitoring</div>
</div>

<div>
<select id="teamFilter">
<option value="Todas">Todas as Equipes</option>
<option value="15">Sub 15</option>
<option value="18">Sub 18</option>
<option value="21">Sub 21</option>
<option value="24">Sub 24</option>
</select>

<select id="athleteFilter">
<option value="Equipe">Equipe (Todos)</option>
</select>
</div>
</div>

<h3>Atletas em Alerta</h3>
<div class="alert-box" id="alerts"></div>

<div class="card">
<div class="chart-title">Wellness Diário</div>
<canvas id="wellnessChart"></canvas>
</div>

<div class="card" id="performanceSection" style="display:none">
<div class="chart-title">Performance do Atleta</div>
<canvas id="performance"></canvas>
</div>

<div class="card" id="perfilSection" style="display:none">
<h3>Perfil do Atleta</h3>
<div class="metric-grid">
<div class="metric"><div id="cmjMetric" class="metric-value">-</div><div class="metric-label">CMJ</div></div>
<div class="metric"><div id="sjMetric" class="metric-value">-</div><div class="metric-label">Squat Jump</div></div>
<div class="metric"><div id="mbMetric" class="metric-value">-</div><div class="metric-label">Medicine Ball</div></div>
</div>
</div>

<div class="card" id="phasePerformance" style="display:none">
<div class="chart-title">Performance por Fase</div>
<canvas id="phaseChart"></canvas>
</div>

</div>
<div class="metric"><div id="sjMetric" class="metric-value">-</div><div class="metric-label">Squat Jump</div></div>
<div class="metric"><div id="mbMetric" class="metric-value">-</div><div class="metric-label">Medicine Ball</div></div>
</div>
</div>

</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2zqGesxYsRhgphN6dpzLhoCCHk54JzzXT7PEFYhLni7uegkBTxRrj8_q3ZzJdN9P77Uum8C078cD8/pub?gid=1108601119&single=true&output=csv"

let rawData=[]
let charts={}

function mean(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0}
function safe(v){return v?Number(v):0}

function getTeam(name){
const parts=name.trim().split(" ")
return parts[parts.length-1]
}

function buildAlerts(){

const container=document.getElementById("alerts")
container.innerHTML=""

const athletes=[...new Set(rawData.map(d=>d['Nome']))]

athletes.forEach(a=>{

const rows=rawData.filter(r=>r['Nome']===a)
const last=rows[rows.length-1]

const rec=safe(last['RECUPERAÇÃO'])
const sono=safe(last['SONO'])
const fad=safe(last['FADIGA'])
const est=safe(last['ESTRESSE'])
const dor=safe(last['DOR'])

let issues=[]

if(rec<6) issues.push("Recuperação < 6")
if(sono<4) issues.push("Sono < 4")
if(fad<4) issues.push("Fadiga < 4")
if(est<4) issues.push("Estresse < 4")
if(dor<4) issues.push("Dor < 4")

if(issues.length>0){
const div=document.createElement("div")
div.className="alert-item"
div.innerHTML=`<strong>${a}</strong> → ${issues.join(', ')}`
container.appendChild(div)
}

})

if(container.innerHTML===""){
container.innerHTML="<div style='color:green'>Nenhum alerta</div>"
}

}

function drawWellness(labels,rec,rpe,sleep,fad,est,dor){

if(charts.wellnessChart) charts.wellnessChart.destroy()

charts.wellnessChart=new Chart(document.getElementById("wellnessChart"),{
 type:'line',
 data:{
 labels:labels,
 datasets:[
 {label:'Recuperação',data:rec,borderColor:'#16a34a',tension:.35,borderWidth:3},
 {label:'Esforço',data:rpe,borderColor:'#f59e0b',tension:.35,borderWidth:3},
 {label:'Sono',data:sleep,borderColor:'#2563eb',tension:.35,borderWidth:3},
 {label:'Fadiga',data:fad,borderColor:'#f97316',tension:.35,borderWidth:3},
 {label:'Estresse',data:est,borderColor:'#dc2626',tension:.35,borderWidth:3},
 {label:'Dor',data:dor,borderColor:'#7c3aed',tension:.35,borderWidth:3}
 ]
 },
 options:{
 responsive:true,
 plugins:{
 legend:{labels:{font:{size:14,weight:'600'}}},
 annotation:{annotations:{
 zonaCritica:{type:'box',yMin:0,yMax:6,backgroundColor:'rgba(220,38,38,0.12)'},
 zonaAlerta:{type:'box',yMin:6,yMax:7,backgroundColor:'rgba(234,179,8,0.18)'},
 zonaIdeal:{type:'box',yMin:7,yMax:10,backgroundColor:'rgba(34,197,94,0.15)'}
 }}
 },
 scales:{y:{min:0,max:10}}
 }
})

}

function updateDashboard(data){

const athlete=document.getElementById("athleteFilter").value

// construir labels dia + turno
const labels=data.map(d=>{
 const date=d['Carimbo de data/hora']?d['Carimbo de data/hora'].split(' ')[0]:''
 const turno=d['Fase']?` ${d['Fase']}`:''
 return date+turno
})

// wellness
const rec=data.map(d=>safe(d['RECUPERAÇÃO']))
const rpe=data.map(d=>safe(d['ESFORÇO']))
const sleep=data.map(d=>safe(d['SONO']))
const fad=data.map(d=>safe(d['FADIGA']))
const est=data.map(d=>safe(d['ESTRESSE']))
const dor=data.map(d=>safe(d['DOR']))

// desenhar gráfico principal
 drawWellness(labels,rec,rpe,sleep,fad,est,dor)

const perf=document.getElementById("performanceSection")
const perfil=document.getElementById("perfilSection")
const phase=document.getElementById("phasePerformance")

// MODO EQUIPE
if(athlete==='Equipe'){
 perf.style.display='none'
 perfil.style.display='none'
 phase.style.display='none'
 return
}

// MODO ATLETA
perf.style.display='none'
perfil.style.display='block'
phase.style.display='block'

const first=data[0]

if(first){
 document.getElementById("cmjMetric").innerText=safe(first['Média CMJ'])
 document.getElementById("sjMetric").innerText=safe(first['Média Squat Jump'])
 document.getElementById("mbMetric").innerText=safe(first['Arremesso Medicine Ball 1'])
}

// gráfico de barras por fase
const fases=[...new Set(data.map(d=>d['Fase']).filter(v=>v))]

const cmj=[]
const sj=[]
const mb=[]

fases.forEach(f=>{
 const rows=data.filter(r=>r['Fase']===f)
 cmj.push(mean(rows.map(r=>safe(r['Média CMJ']))))
 sj.push(mean(rows.map(r=>safe(r['Média Squat Jump']))))
 mb.push(mean(rows.map(r=>safe(r['Arremesso Medicine Ball 1']))))
})

if(charts.phaseChart) charts.phaseChart.destroy()

charts.phaseChart=new Chart(document.getElementById("phaseChart"),{
 type:'bar',
 data:{
  labels:fases,
  datasets:[
   {label:'CMJ',data:cmj,backgroundColor:'#0891b2'},
   {label:'Squat Jump',data:sj,backgroundColor:'#2563eb'},
   {label:'Medicine Ball',data:mb,backgroundColor:'#7c3aed'}
  ]
 },
 options:{
  plugins:{legend:{labels:{font:{size:14,weight:'600'}}}},
  scales:{y:{beginAtZero:true}}
 }
})

})

const rec=data.map(d=>safe(d['RECUPERAÇÃO']))
const rpe=data.map(d=>safe(d['ESFORÇO']))
const sleep=data.map(d=>safe(d['SONO']))
const fad=data.map(d=>safe(d['FADIGA']))
const est=data.map(d=>safe(d['ESTRESSE']))
const dor=data.map(d=>safe(d['DOR']))

 drawWellness(labels,rec,rpe,sleep,fad,est,dor)

const perf=document.getElementById("performanceSection")
const perfil=document.getElementById("perfilSection")
const phase=document.getElementById("phasePerformance")

if(athlete==='Equipe'){
 perf.style.display='none'
 perfil.style.display='none'
 phase.style.display='none'
}else{
 perf.style.display='block'
 perfil.style.display='block'
 phase.style.display='block'
}

const first=data[0]

if(first){
 document.getElementById("cmjMetric").innerText=safe(first['Média CMJ'])
 document.getElementById("sjMetric").innerText=safe(first['Média Squat Jump'])
 document.getElementById("mbMetric").innerText=safe(first['Arremesso Medicine Ball 1'])
}

// gráfico por fase
if(athlete!=='Equipe'){

const fases=[...new Set(data.map(d=>d['Fase']))]

const cmj=[]
const sj=[]
const mb=[]

fases.forEach(f=>{
 const rows=data.filter(r=>r['Fase']===f)
 cmj.push(mean(rows.map(r=>safe(r['Média CMJ']))))
 sj.push(mean(rows.map(r=>safe(r['Média Squat Jump']))))
 mb.push(mean(rows.map(r=>safe(r['Arremesso Medicine Ball 1']))))
})

if(charts.phaseChart) charts.phaseChart.destroy()

charts.phaseChart=new Chart(document.getElementById("phaseChart"),{
 type:'bar',
 data:{
  labels:fases,
  datasets:[
   {label:'CMJ',data:cmj,backgroundColor:'#0891b2'},
   {label:'Squat Jump',data:sj,backgroundColor:'#2563eb'},
   {label:'Medicine Ball',data:mb,backgroundColor:'#7c3aed'}
  ]
 }
})

}

}

}

function applyFilters(){

 const team=document.getElementById("teamFilter").value
 const athlete=document.getElementById("athleteFilter").value

 let data=[...rawData]

 if(team!=="Todas"){
   data=data.filter(d=>getTeam(d['Nome'])===team)
 }

 if(athlete!=="Equipe"){
   data=data.filter(d=>d['Nome']===athlete)
 }

 updateDashboard(data)

}

function populateAthletes(){

const select=document.getElementById("athleteFilter")

const athletes=[...new Set(rawData.map(d=>d['Nome']))]

athletes.forEach(a=>{
 const option=document.createElement("option")
 option.value=a
 option.text=a
 select.appendChild(option)
})

select.addEventListener("change",applyFilters)

document.getElementById("teamFilter").addEventListener("change",applyFilters)

}

function load(){

// garantir atualização inicial após carregar dados


Papa.parse(sheetURL,{download:true,header:true,complete:function(res){

rawData=res.data.filter(r=>r['Nome'])

populateAthletes()
buildAlerts()
updateDashboard(rawData)

}})

}

load()

</script>

</body>
</html>
